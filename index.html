<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>邮藏集</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#FAF8F5;color:#1A1A2E;max-width:390px;margin:0 auto;overflow:hidden;height:100%}
.page{display:none;height:100%;overflow-y:auto;padding:16px 16px 80px}
.page.a{display:block}
h1{color:#1B324F;font-size:22px;margin-bottom:8px}
.nav{position:fixed;bottom:0;max-width:390px;width:100%;background:#FFF;border-top:1px solid #ddd;display:flex;justify-content:space-around;padding:8px 0 12px;z-index:100}
.ni{background:none;border:none;cursor:pointer;font-size:12px;color:#94A3B8;padding:4px 16px}
.ni.a{color:#1B324F;font-weight:700}
.sr{display:flex;gap:8px;margin:16px 0}
.st{flex:1;background:#FFF;border-radius:10px;padding:14px;text-align:center;border:1px solid #ddd}
.st .n{font-size:28px;font-weight:700;color:#1B324F}
.st .l{font-size:11px;color:#94A3B8;margin-top:4px}
.scr{display:flex;gap:12px;overflow-x:auto;margin-bottom:24px}
.hc{flex-shrink:0;width:140px;background:#FFF;border-radius:10px;border:1px solid #ddd;padding:12px;cursor:pointer}
.hc .nm{font-weight:600;font-size:13px}
.hc .mt{font-size:11px;color:#94A3B8}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sc{background:#FFF;border-radius:10px;border:1px solid #ddd;padding:12px;cursor:pointer}
.sc .pr{color:#E93D82;font-weight:600}
.flr{display:flex;gap:8px;margin:8px 0}
.fl{padding:6px 14px;border-radius:999px;background:#FFF;border:1px solid #ddd;cursor:pointer;font-size:12px}
.fl.a{background:#1B324F;color:#FFF}
.sb input{width:100%;padding:10px 16px;border-radius:999px;border:1px solid #ddd;font-size:14px}
.bk{font-size:20px;cursor:pointer;color:#1B324F;margin-right:8px}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
.di{background:#F5F1EB;border-radius:8px;padding:10px}
.di .l{font-size:11px;color:#94A3B8}
.di .v{font-size:14px;font-weight:600}
.dx{background:#FFF;border-radius:10px;padding:16px;border:1px solid #ddd;margin-bottom:16px}
.dx h3{color:#1B324F;margin-bottom:8px}
.prr{display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid #ddd}
.prv{font-weight:700;color:#E93D82}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1A1A2E;color:#FFF;padding:10px 20px;border-radius:999px;opacity:0}
.toast.s{opacity:1}
</style>
</head>
<body>
<div class="page a" id="home"><h1>我的藏品</h1><p style="font-size:13px;color:#64748B">共 6 件藏品</p><div class="sr"><div class="st"><div class="n">6</div><div class="l">藏品</div></div><div class="st"><div class="n">12</div><div class="l">新增</div></div><div class="st"><div class="n">4</div><div class="l">收藏</div></div></div><div class="scr" id="r"></div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px"><div class="hc" style="text-align:center;font-size:11px" onclick="go('search')">搜索</div><div class="hc" style="text-align:center;font-size:11px" onclick="go('fav')">收藏</div><div class="hc" style="text-align:center;font-size:11px" onclick="go('add')">录入</div><div class="hc" style="text-align:center;font-size:11px" onclick="go('backup')">备份</div></div></div>
<div class="page" id="search"><h1>搜索</h1><div class="sb"><input id="sq" placeholder="搜索..." oninput="fs()"></div><div class="flr"><span class="fl a" onclick="sf(this,'all')">全部</span><span class="fl" onclick="sf(this,'清代')">清代</span><span class="fl" onclick="sf(this,'民国')">民国</span><span class="fl" onclick="sf(this,'新中国')">新中国</span></div><div class="sg" id="sg"></div></div>
<div class="page" id="fav"><h1>收藏</h1><div class="sg" id="fg"></div></div>
<div class="page" id="profile"><h1>我的</h1><div style="text-align:center;padding:32px 0"><div style="width:72px;height:72px;border-radius:50%;background:#1B324F;color:#FFF;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:28px">邮</div><div style="font-size:18px;font-weight:700">集邮爱好者</div></div><div class="sr"><div class="st"><div class="n">6</div><div class="l">藏品</div></div><div class="st"><div class="n">4</div><div class="l">收藏</div></div><div class="st"><div class="n">3</div><div class="l">关注</div></div></div></div>
<div class="page" id="detail"><div style="display:flex;align-items:center;margin-bottom:8px"><span class="bk" onclick="bh()">&lt;</span><h1>详情</h1></div><div class="dg" id="dg"></div><div class="dx"><h3>介绍</h3><p id="dd"></p></div><div class="dx"><h3>价格</h3><div id="dpr"></div></div></div>
<div class="page" id="add"><div style="display:flex;align-items:center;margin-bottom:8px"><span class="bk" onclick="bh()">&lt;</span><h1>录入</h1></div><form onsubmit="ha(event)"><input id="an" placeholder="名称" style="width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;margin-bottom:8px;font-size:14px" required><input id="ad" placeholder="年代" style="width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;margin-bottom:8px;font-size:14px"><button style="width:100%;padding:14px;border-radius:10px;background:#1B324F;color:#FFF;border:none;font-size:16px;cursor:pointer;margin-top:8px">确认录入</button></form></div>
<div class="page" id="backup"><h1>备份</h1><div class="sr"><div class="st"><div class="n">6</div><div class="l">藏品</div></div><div class="st"><div class="n">12</div><div class="l">图片</div></div><div class="st"><div class="n">2</div><div class="l">MB</div></div></div><div style="background:#FFF;border-radius:10px;padding:16px;border:1px solid #ddd"><h3 style="color:#1B324F;margin-bottom:8px">云端备份</h3><div style="font-size:13px;color:#64748B">上次: 2025-01-15</div></div></div>
<nav class="nav">
<div class="ni a" onclick="nv('home',this)">首页</div>
<div class="ni" onclick="nv('search',this)">分类</div>
<div class="ni" onclick="nv('fav',this)">收藏</div>
<div class="ni" onclick="nv('profile',this)">我的</div>
</nav>
<div class="toast" id="toast"></div>
<script>
var D=[{id:'s1',nm:'大龙薄纸',dy:'清代',ds:'大龙邮票是中国第一套邮票。',pr:[{s:'SPINK',v:'HK$38,000'}]},{id:'s2',nm:'红印花',dy:'清代',ds:'红印花加盖，清代珍邮。',pr:[{s:'嘉德',v:'^287,500'}]},{id:'s3',nm:'孙中山像',dy:'民国',ds:'伦敦版孙中山像邮票。',pr:[{s:'赵涌',v:'^6,900'}]},{id:'s4',nm:'梅兰芳M',dy:'新中国',ds:'新中国第一枚小型张。',pr:[{s:'嘉德',v:'^218,500'}]},{id:'s5',nm:'一片红',dy:'新中国',ds:'因地图问题被撤销。',pr:[{s:'嘉德',v:'^1,035,000'}]},{id:'s6',nm:'猴票',dy:'新中国',ds:'首枚生肖邮票。',pr:[{s:'赵涌',v:'^12,650'}]}];
var F=['s1','s4','s5'];
function go(i){document.querySelectorAll('.page').forEach(function(p){p.classList.remove('a')});document.getElementById(i).classList.add('a')}
function nv(i,e){go(i);document.querySelectorAll('.ni').forEach(function(x){x.classList.remove('a')});e.classList.add('a')}
function bh(){go('home');document.querySelector('.ni').classList.add('a')}
function od(s){go('detail');document.getElementById('dg').innerHTML='<div class="di"><div class="l">名称</div><div class="v">'+s.nm+'</div></div><div class="di"><div class="l">年代</div><div class="v">'+s.dy+'</div></div>';document.getElementById('dd').textContent=s.ds;document.getElementById('dpr').innerHTML=s.pr.map(function(p){return'<div class="prr"><span>'+p.s+'</span><span class="prv">'+p.v+'</span></div>'}).join('')}
function rr(){var c=document.getElementById('r');c.innerHTML='';for(var i=0;i<D.length;i++){c.innerHTML+='<div class="hc" onclick="od(D['+i+'])"><div class="nm">'+D[i].nm+'</div><div class="mt">'+D[i].dy+'</div></div>'}}
function rf(){var c=document.getElementById('fg');c.innerHTML='';for(var i=0;i<D.length;i++){if(F.indexOf(D[i].id)<0)continue;c.innerHTML+='<div class="sc" onclick="od(D['+i+'])"><div class="nm">'+D[i].nm+'</div><div class="pr">'+D[i].pr[0].v+'</div></div>'}if(!c.innerHTML)c.innerHTML='<div style="text-align:center;padding:40px;color:#94A3B8">暂无收藏</div>'}
function fs(){var q=document.getElementById('sq').value;var c=document.getElementById('sg');c.innerHTML='';var a=document.querySelector('.fl.a');var ct=a?a.textContent:'全部';for(var i=0;i<D.length;i++){if(ct!='全部'&&D[i].dy!=ct)continue;if(q&&D[i].nm.indexOf(q)<0)continue;c.innerHTML+='<div class="sc" onclick="od(D['+i+'])"><div class="nm">'+D[i].nm+'</div><div class="pr">'+D[i].pr[0].v+'</div></div>'}if(!c.innerHTML)c.innerHTML='<div style="text-align:center;padding:40px;color:#94A3B8">无结果</div>'}
function sf(el,c){document.querySelectorAll('.fl').forEach(function(x){x.classList.remove('a')});el.classList.add('a');fs()}
function ha(e){e.preventDefault();if(!document.getElementById('an').value)return;var t=document.getElementById('toast');t.textContent='录入成功！';t.classList.add('s');setTimeout(function(){t.classList.remove('s')},2000);document.getElementById('an').value=''}
rr();rf();fs();
</script>
</body>
</html>.
